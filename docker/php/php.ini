; Configurações PHP para WosKaraoke
display_errors = On
error_reporting = E_ALL
log_errors = On

upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 120
memory_limit = 256M

date.timezone = America/Sao_Paulo

session.gc_maxlifetime = 86400
session.cookie_lifetime = 86400

; Para upload de arquivos Excel grandes (catálogo de músicas)
max_file_uploads = 20
