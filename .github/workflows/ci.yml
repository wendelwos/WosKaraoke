name: WosKaraoke CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ============================================
  # VERIFICAÇÃO DE SINTAXE PHP
  # ============================================
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, pdo, pdo_mysql, pdo_sqlite
    
    - name: Check PHP syntax
      run: |
        find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  # ============================================
  # TESTES UNITÁRIOS
  # ============================================
  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, pdo, pdo_mysql, pdo_sqlite
        coverage: xdebug
    
    - name: Get Composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
    
    - name: Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-
    
    - name: Install dependencies
      run: composer install --prefer-dist --no-progress
    
    - name: Install PHPUnit
      run: composer require --dev phpunit/phpunit:^10 --no-interaction
    
    - name: Run tests
      run: vendor/bin/phpunit --testdox
      env:
        DB_TYPE: sqlite
        DB_FILE: ':memory:'
        APP_ENV: testing

  # ============================================
  # VERIFICAÇÃO DE SEGURANÇA
  # ============================================
  security:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check for exposed secrets
      run: |
        if grep -r "GOCSPX-" --include="*.php" --exclude-dir=vendor .; then
          echo "❌ Found exposed Google secrets!"
          exit 1
        fi
        if grep -r "pusher.*secret.*=" --include="*.php" --exclude-dir=vendor . | grep -v "Env::get"; then
          echo "⚠️ Found potential exposed Pusher secrets"
        fi
        echo "✅ No obvious secrets found in code"
    
    - name: Check .env.example exists
      run: |
        if [ ! -f ".env.example" ]; then
          echo "❌ Missing .env.example file"
          exit 1
        fi
        echo "✅ .env.example exists"
